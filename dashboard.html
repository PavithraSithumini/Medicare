<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediTrack - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="fas fa-pills"></i></div>
            <h1>MediTrack</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="add.html"><i class="fas fa-plus-circle"></i> Add Medicine</a>
            <a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout </a>
        </nav>
        <div class="sidebar-footer">
            <span class="doctor-name"><i class="fas fa-user-md"></i> Dr. Jayasekara</span>
            <span>Family Care Medical Center, Gelioya</span>
            <span style="margin-top:4px;font-size:11px;">v1.0 &bull; 2026</span>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="sidebar-toggle" id="mobileToggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <span class="brand-mobile">MediTrack</span>
        </div>

        <!-- Dashboard -->
        <section class="page">
            <div class="page-header">
                <div>
                    <h2>
                        Dashboard
                        <small>Monitor your medicine stock and expiry dates.</small>
                    </h2>
                </div>
                <div class="header-actions">
                    <a href="add.html" class="btn-add"><i class="fas fa-plus"></i> Add Medicine</a>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="fas fa-capsules"></i></div>
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="stat-label">Total Medicines</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-number" id="statSafe">0</div>
                    <div class="stat-label">Safe Stock</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-exclamation-circle"></i></div>
                    <div class="stat-number" id="statExpired">0</div>
                    <div class="stat-label">Expired</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
                    <div class="stat-number" id="statExpiring">0</div>
                    <div class="stat-label">Expiring Soon</div>
                </div>
            </div>

            <!-- Search & Table -->
            <div class="table-toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search medicines..." oninput="renderTable()" />
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="btn-outline" onclick="clearSearch()" style="font-size:13px;padding:8px 16px;">
                        <i class="fas fa-times"></i> Clear
                    </button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Medicine</th>
                            <th>Qty</th>
                            <th>Expiry Date</th>
                            <th>Days Left</th>
                            <th>Status</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- rendered by JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== SIDEBAR OVERLAY ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="assets/app.js"></script>
    <script>
        // Sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            this.classList.remove('open');
        });

        // ===== RENDER TABLE =====
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const medicines = getMedicines();
            let filtered = medicines;
            if (query) {
                filtered = medicines.filter(m =>
                    m.name.toLowerCase().includes(query)
                );
            }

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="fas fa-capsules"></i>
                                <h4>No medicines found</h4>
                                <p>${medicines.length === 0 ? 'Use the "Add Medicine" button to start.' : 'Try adjusting your search.'}</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            // Sort: expired first, then expiring, then safe
            const sorted = [...filtered].sort((a, b) => getDaysLeft(a.expiry) - getDaysLeft(b.expiry));

            tbody.innerHTML = sorted.map(m => {
                const days = getDaysLeft(m.expiry);
                const status = getStatus(days);
                const statusClass = status;
                const daysDisplay = days < 0 ? `${Math.abs(days)} days ago` :
                                   days === 0 ? 'Today' :
                                   `${days} days left`;
                const daysClass = status;
                return `
                    <tr>
                        <td class="medicine-name">${m.name}</td>
                        <td><strong>${m.quantity}</strong></td>
                        <td>${formatDate(m.expiry)}</td>
                        <td class="days-left ${daysClass}">${daysDisplay}</td>
                        <td><span class="status-badge ${statusClass}"><span class="dot"></span> ${getStatusLabel(status)}</span></td>
                        <td style="text-align:center;">
                            <div class="action-btns" style="justify-content:center;">
                                <a href="add.html?id=${m.id}" class="edit-btn" title="Edit"><i class="fas fa-pen"></i></a>
                                <button class="delete-btn" onclick="deleteMedicine('${m.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // ===== DELETE =====
        function deleteMedicine(id) {
            const medicines = getMedicines();
            const med = medicines.find(m => m.id === id);
            if (!med) return;
            if (!confirm(`Are you sure you want to delete "${med.name}"?`)) return;
            const updated = medicines.filter(m => m.id !== id);
            saveMedicines(updated);
            showToast(`🗑️ "${med.name}" deleted.`, 'error');
            renderDashboard();
        }

        // ===== CLEAR SEARCH =====
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderTable();
        }

        // ===== RENDER STATS =====
        function renderDashboard() {
            const medicines = getMedicines();
            const total = medicines.length;
            let safe = 0, expired = 0, expiring = 0;
            medicines.forEach(m => {
                const days = getDaysLeft(m.expiry);
                if (days < 0) expired++;
                else if (days <= 30) expiring++;
                else safe++;
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statSafe').textContent = safe;
            document.getElementById('statExpired').textContent = expired;
            document.getElementById('statExpiring').textContent = expiring;
            renderTable();
        }

        const successMessage = localStorage.getItem('loginSuccessMessage');
        if (successMessage) {
            showToast(successMessage, 'success');
            localStorage.removeItem('loginSuccessMessage');
        }

        // Initial render
        renderDashboard();
    </script>
</body>
</html>
