<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Login</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="login-brand">
                <div class="brand-icon"><i class="fas fa-pills"></i></div>
                <h1>MediTrack</h1>
            </div>

            <!-- Title -->
            <div class="login-title">
                <h2>Welcome Back</h2>
                <p>Sign in to manage your medicine inventory</p>
            </div>

            <!-- Error message -->
            <div class="login-error" id="loginError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMsg">Invalid username or password.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required autofocus />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required />
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember">
                        <input type="checkbox" checked /> Remember me
                    </label>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <div class="login-footer" style="margin-top: 18px; text-align: center;">
                    <a href="index.html" class="btn-primary">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                </div>
            </form>

        </div>
    </div>

    <script>
        // ===== LOGIN HANDLER =====
        function handleLogin(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorBox = document.getElementById('loginError');
            const errorMsg = document.getElementById('errorMsg');

            // Hardcoded credentials
            const validUsername = 'admin';
            const validPassword = 'password123';

            // Hide any previous error state
            errorBox.classList.remove('show');

            if (username === validUsername && password === validPassword) {
                localStorage.setItem('loginSuccessMessage', 'Login successful!');
                window.location.href = 'dashboard.html';
            } else {
                // ❌ Show error
                errorMsg.textContent = 'Invalid username or password. Please try again.';
                errorBox.classList.add('show');

                // Shake animation (optional)
                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.4s ease';
                setTimeout(() => {
                    card.style.animation = '';
                }, 500);
            }
        }

        // ===== SHAKE KEYFRAME (injected) =====
        const styleShake = document.createElement('style');
        styleShake.textContent = `
                    @keyframes shake {
                        0%, 100% { transform: translateX(0); }
                        20% { transform: translateX(-10px); }
                        40% { transform: translateX(10px); }
                        60% { transform: translateX(-6px); }
                        80% { transform: translateX(6px); }
                    }
                `;
        document.head.appendChild(styleShake);

        // ===== SIDEBAR TOGGLE LOGIC (for consistency, though not used on login) =====
        // This is just a placeholder to match the pattern; login doesn't have a sidebar.
        // But we keep it silent.
        console.log('Login page loaded.');
    </script>
</body>

</html>
