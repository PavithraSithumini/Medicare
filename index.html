<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediTrack - Home</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <!-- Mobile Header -->
        <div class="mobile-header">
            <button class="sidebar-toggle" id="mobileToggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <span class="brand-mobile">MediTrack</span>
        </div>

        <!-- Home Page -->
        <section class="page" id="home">
            <div class="home-bg"></div>
            <div class="home-content">
                <div class="badge"><i class="fas fa-heartbeat"></i> Trusted Care</div>
                <h1>
                    Family Care<br />
                    <span class="highlight">Medical Center</span>
                </h1>
                <div class="sub-title">Gelioya</div>
                <div class="doctor-name-lg">
                    <i class="fas fa-user-md" style="color:var(--primary-light);margin-right:6px;"></i>
                    <span>DR. Jayasekara</span>
                </div>
                <p>
                    Effortlessly track your medicine inventory, monitor expiry dates,
                    and ensure your patients always have what they need.
                </p>
                <a href="login.html" class="btn-primary">
                    <i class="fas fa-arrow-right"></i> Login
                </a>

                <div class="home-stats-mini" id="homeStats">
                    <div class="stat-item">
                        <div class="num" id="homeTotal">0</div>
                        <div class="label">Total Medicines</div>
                    </div>
                    <div class="stat-item">
                        <div class="num" id="homeSafe">0</div>
                        <div class="label">Safe Stock</div>
                    </div>
                    <div class="stat-item">
                        <div class="num" id="homeExpired">0</div>
                        <div class="label">Expired</div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ===== SIDEBAR OVERLAY (mobile) ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="app.js"></script>
    <script>
        // Sidebar toggle for mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            this.classList.remove('open');
        });

        // Update home stats
        function updateHomeStats() {
            const medicines = getMedicines();
            const total = medicines.length;
            let safe = 0, expired = 0;
            medicines.forEach(m => {
                const days = getDaysLeft(m.expiry);
                if (days < 0) expired++;
                else safe++;
            });
            document.getElementById('homeTotal').textContent = total;
            document.getElementById('homeSafe').textContent = safe;
            document.getElementById('homeExpired').textContent = expired;
        }
        updateHomeStats();
    </script>
</body>
</html>
